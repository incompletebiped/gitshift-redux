name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx vsce package

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GitShift Redux v${{ steps.version.outputs.VERSION }}
          body: |
            ## GitShift Redux v${{ steps.version.outputs.VERSION }}

            ### Install

            Download `gitshift-redux-${{ steps.version.outputs.VERSION }}.vsix` below and install via:

            **Cursor / VS Code UI:** `Extensions` → `···` → `Install from VSIX...`

            **Command line:**
            ```
            cursor --install-extension gitshift-redux-${{ steps.version.outputs.VERSION }}.vsix
            ```
          files: gitshift-redux-${{ steps.version.outputs.VERSION }}.vsix
          draft: false
          prerelease: false
